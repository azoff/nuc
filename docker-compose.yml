services:

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - /tmp/redis:/data
    networks:
      - internal

  pdf:
    image: azoff/flask-pdf-tokenizer:1.21.0
    deploy:
      replicas: 2
    restart: unless-stopped
    expose:
      - 8000
    # ports:
    #   - 8000:8000
    environment:
      - REDIS_HOST=redis
    networks:
      - internal
      - default

  sftp:
    image: azoff/sftp
    build: sftp
    restart: unless-stopped
    ports:
      - 2222:22
    volumes:
      - ${SHARED_MOUNT_PATH:-/tmp}/sftp/home:/home
      - ${SHARED_MOUNT_PATH:-/tmp}/sftp/etc:/etc/sftp:ro
      - ${SHARED_MOUNT_PATH:-/tmp}/sftp/ssh:/etc/ssh
      - ./sftp/sshd_config:/etc/ssh/sshd_config:ro
      - ./sftp/set-permissions.sh:/etc/sftp.d/set-permissions.sh:ro
    command: 'jon::${UID:-1000}'
    networks:
      - default

  nginx:
    dns:
      - 192.168.1.1
    image: azoff/nginx
    build: nginx
    restart: unless-stopped
    volumes:
      - ${SHARED_MOUNT_PATH:-/tmp}/sftp/home/carolyn/share/carolyn.thayer.azof.fr:/var/www/vhosts/carolyn.thayer.azof.fr
      - https-portal-data:/var/lib/https-portal
    networks:
      - default
    ports:
      - 80:80
      - 443:443
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - STAGE=${CERT_STAGE:-local}
      - DOMAINS=
          cmt.azof.fr => https://carolyn.thayer.azof.fr,
          carolyn.thayer.azof.fr,
          plex.azof.fr -> http://host.docker.internal:32400,
          ${CCTV_LOGIN:-}@cctv.azof.fr -> http://${CCTV_IP:-tinypilot}, 
          ${PDF_LOGIN:-}@pdf.azof.fr -> http://pdf:8000,
          ${PROWLARR_LOGIN:-}@prowl.azof.fr -> http://host.docker.internal:9696,
          tx.azof.fr -> http://host.docker.internal:9091,

  plex:
    image: azoff/plex
    build: plex
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 10G
    volumes:
      - ${SHARED_MOUNT_PATH:-/tmp}/plex/data:/data:ro
      - ${SHARED_MOUNT_PATH:-/tmp}/plex/config:/config
      - ${PLEX_TRANSCODE_PATH:-/tmp/plex/transcode}:/transcode
    env_file: .env
    devices:
      - /dev/dri:/dev/dri
    network_mode: host
  
  transmission:
    image: azoff/transmission
    build: transmission
    restart: unless-stopped
    volumes:
      - ${SHARED_MOUNT_PATH:-/tmp}/plex/data:/downloads
      - ${SHARED_MOUNT_PATH:-/tmp}/transmission/config:/config
      - ${SHARED_MOUNT_PATH:-/tmp}/transmission/watch:/watch
    env_file: .env
    environment:
      - USER=${TRANSMISSION_USER:-transmission}
      - PASS=${TRANSMISSION_PASSWORD:-transmission}
    network_mode: service:vpn
    depends_on:
      - vpn

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    restart: unless-stopped
    env_file: .env
    network_mode: service:vpn
    environment:
      - TZ=${TZ:-America/Los_Angeles}
      - PUID=${UID:-1000}
      - PGID=${GID:-1000}
      - PROWLARR__ApiKey=${PROWLARR_API_KEY:-prowlarrapikey}
      - PROWLARR__InstanceName=${PROWLARR_INSTANCE_NAME:-prowlarr}
      - PROWLARR__Server__Port=${PROWLARR_PORT:-9696}
      - PROWLARR__AuthenticationMethod=External
      - PROWLARR__AuthenticationRequired=DisabledForLocalAddresses
      - TRANSMISSION_HOST=127.0.0.1
      - TRANSMISSION_PORT=${TRANSMISSION_PORT:-9091}
      - TRANSMISSION_USER=${TRANSMISSION_USER:-transmission}
      - TRANSMISSION_PASSWORD=${TRANSMISSION_PASSWORD:-transmission}
    volumes:
      - ${SHARED_MOUNT_PATH:-/tmp}/prowlarr/config:/config
      - ./prowlarr/configure-settings.sh:/custom-cont-init.d/00-configure-settings.sh:ro
      - ./prowlarr/init-prowlarr.sh:/opt/init-prowlarr.sh:ro
      - ./prowlarr/launch-init.sh:/custom-cont-init.d/10-launch-init.sh:ro
    depends_on:
      - vpn
      - transmission
  
  vpn:
    image: azoff/vpn
    build: vpn
    environment:
      - ACTIVATION_CODE=${EXPRESSVPN_ACTIVATION_CODE}
    cap_add:
      - NET_ADMIN
    devices: 
      - /dev/net/tun
    stdin_open: true
    tty: true
    command: /bin/bash
    privileged: true
    restart: unless-stopped
    ports:
      # transmission / bittrorrent
      - 9091:9091
      - 51413:51413
      - 51413:51413/udp
      # prowlarr (shared network stack)
      - 9696:9696
    
volumes:
  https-portal-data:

networks:
  internal:
  default: